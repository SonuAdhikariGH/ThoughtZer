<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThoughtZer</title>
  </head>
  <body>
    <h1 class="heading-brand">Generate thought</h1>
    <!-- main element -->
    <div class="serverStat-container">
      <span id="serverStats"> • Server Active </span>
      <span id="serverStats2"> • 1000+ Requests </span>
    </div>

    <div class="main-container">
      <p id="thoughtMain"></p>
      <p id="authorName"></p>
    </div>

    <!-- button -->
    <div class="Btn-container">
      <p class="btn-instruction">
        Press this button to generate a thought.. 🚀
      </p>
      <button id="generateThoughtBtn">Generate</button>
    </div>

    <span class="copyright">©️ All copyrights reserved by Sanu Adhikari</span>
  </body>
  <script src="app.js"></script>
